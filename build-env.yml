---
- name: Research Environment Deployment
  hosts: localhost
  connection: local
  vars:
    data_dir: "{{ lookup('env', 'DATA_DIRECTORY') | default('/workspace', true) | regex_replace('/$', '') }}"
    github_pat: "{{ lookup('env', 'GITHUB_PAT') }}"
    python_version: "3.12"
    comfyui_path: "{{ data_dir }}/ComfyUI"
    venv_path: "{{ data_dir }}/.venv"

  tasks:
    - name: Install system dependencies (libs for OpenCV)
      become: yes
      apt:
        name: [libgl1, libglib2.0-0, ffmpeg]
        state: present
        update_cache: yes

    - name: Setup Taskfile repository
      become: yes
      shell: "curl -1sLf 'https://dl.cloudsmith.io/public/task/task/setup.deb.sh' | bash"
      args:
        creates: "/etc/apt/sources.list.d/task-task.list"

    - name: Install Taskfile package
      become: yes
      apt:
        name: task
        state: present

    - name: Install HuggingFace CLI
      become: yes
      shell: "curl -LsSf https://hf.co/cli/install.sh | bash"
      args:
        creates: "/usr/local/bin/hf"

    - name: Clone private automation scripts
      git:
        repo: "https://{{ github_pat }}@github.com/Khar-Ma2/{{ item }}.git"
        dest: "{{ data_dir }}/{{ item }}"
      loop:
        - "comfyui-autodownload-scripts"
        - "comfyui-batch-generation-script"

    - name: Install comfy-cli and manager
      command: "pip install comfy-cli comfyui-manager"

    # --- НАЛАШТУВАННЯ ОТОЧЕННЯ ---
    - name: Persist environment in .bashrc
      blockinfile:
        path: ~/.bashrc
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK - COMFYUI ENV"
        block: |
          export COMFYUI_PATH="{{ comfyui_path }}"
          export VIRTUAL_ENV="{{ venv_path }}"
          export PATH="$VIRTUAL_ENV/bin:$PATH"
          export UV_CACHE_DIR="{{ data_dir }}/.cache/uv"

    - name: Initialize uv venv at workspace root
      command: "uv venv --seed --python {{ python_version }}"
      args:
        chdir: "{{ data_dir }}"
        creates: "{{ venv_path }}"

    # --- БЛОК ІЗ ЛОКАЛЬНИМ VENV ---
    - name: ComfyUI block with local venv
      block:
        - name: Install ComfyUI core via comfy-cli
          shell: 'yes | uv run comfy --here install --nvidia --skip-manager'
          args:
            chdir: "{{ data_dir }}"
            creates: "{{ comfyui_path }}/main.py"

        - name: Clone ComfyScript into custom_nodes
          git:
            repo: "https://github.com/Chaoses-Ib/ComfyScript.git"
            dest: "{{ comfyui_path }}/custom_nodes/ComfyScript"

        - name: Install ComfyScript in editable mode
          command: "uv pip install -e ./custom_nodes/ComfyScript[default]"
          args:
            chdir: "{{ comfyui_path }}"
      environment:
        VIRTUAL_ENV: "{{ venv_path }}"
        PATH: "{{ venv_path }}/bin:{{ ansible_env.PATH }}"
        UV_PROJECT_ENVIRONMENT: "{{ venv_path }}"
        UV_CACHE_DIR: "{{ data_dir }}/.cache/uv"